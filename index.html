<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERTIME — LOOPPP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f7f5f0;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#efefef}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* ── NAV ── */
nav{height:50px;background:#fff;border-bottom:1px solid #e8e5df;display:flex;align-items:center;padding:0 20px;gap:0;position:relative;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.15em;color:#1a1a1a;margin-right:28px;display:flex;align-items:baseline;gap:8px}
.logo em{color:#aaa;font-style:normal;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.1em}
.nl{padding:0 14px;height:50px;display:flex;align-items:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.nl:hover{color:#1a1a1a}
.nl.on{color:#1a1a1a;border-bottom-color:#1a1a1a}
.nav-r{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{padding:6px 14px;border-radius:5px;border:1px solid #ddd;background:#fff;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#888;transition:all .12s}
.btn:hover{border-color:#1a1a1a;color:#1a1a1a}
.btn-dark{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.btn-dark:hover{background:#333;border-color:#333;color:#fff}
.btn-r{border-color:#ff3b30;color:#ff3b30}
.btn-r:hover{background:#ff3b30;color:#fff}
.btn-sm{padding:4px 10px;font-size:9px}
.btn-xs{padding:3px 8px;font-size:9px}

/* ── PAGES ── */
.pg{display:none;position:fixed;top:50px;left:0;right:0;bottom:0}
.pg.on{display:flex}

/* ══════════════════════════════════
   PLANNING PAGE
══════════════════════════════════ */
#pg-plan{flex-direction:row}

/* Sidebar */
.sb{width:200px;min-width:200px;background:#fff;border-right:1px solid #e8e5df;display:flex;flex-direction:column;overflow:hidden}
.sb-sec{border-bottom:1px solid #e8e5df}
.sb-sec-hd{padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between}
.sb-sec-t{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.1em;color:#888}
.sb-sec-body{padding:6px 8px}
.sb-scroll{flex:1;overflow-y:auto}

/* Project chip (draggable) */
.proj-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid #eee;background:#fafafa;margin-bottom:4px;cursor:grab;user-select:none;transition:all .12s;position:relative;overflow:hidden}
.proj-chip::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.proj-chip:hover{border-color:#ddd;background:#f5f5f5;transform:translateX(2px)}
.proj-chip.dragging{opacity:.3}
.proj-chip-name{font-weight:600;font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-chip-ref{font-family:'DM Mono',monospace;font-size:9px;color:#aaa}

/* Freelance chip (draggable) */
.fl-chip{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid #eee;background:#fafafa;margin-bottom:3px;cursor:grab;user-select:none;transition:all .12s}
.fl-chip:hover{border-color:#ddd;background:#f5f5f5;transform:translateX(2px)}
.fl-chip.dragging{opacity:.3}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.fl-nm{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fl-rl{font-family:'DM Mono',monospace;font-size:9px;color:#aaa;text-transform:uppercase}

.fpill{padding:2px 7px;border-radius:20px;border:1px solid #e8e5df;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;color:#aaa;transition:all .1s;user-select:none}
.fpill:hover{border-color:#aaa;color:#555}
.fpill.on{background:#1a1a1a;border-color:#1a1a1a;color:#fff}

/* Planning main */
.plan-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f7f5f0}
.plan-tb{height:44px;background:#fff;border-bottom:1px solid #e8e5df;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.vtg{display:flex;background:#f0ede8;border-radius:5px;padding:2px;gap:1px}
.vt{padding:4px 12px;border:none;border-radius:4px;background:transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#aaa;transition:all .12s}
.vt.on{background:#1a1a1a;color:#fff}
.parr{width:26px;height:26px;background:#fff;border:1px solid #e0ddd8;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;transition:all .12s}
.parr:hover{border-color:#1a1a1a;color:#1a1a1a}
.plbl{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.07em;min-width:180px;text-align:center;color:#1a1a1a}
.plan-grid{flex:1;overflow:auto}

/* ── MONTH GRID ── */
.mg{display:grid;grid-template-columns:repeat(7,1fr);min-width:900px}
.mg-hd{padding:7px 8px;text-align:center;background:#fff;border-bottom:1px solid #e8e5df;border-right:1px solid #e8e5df;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;position:sticky;top:0;z-index:5}
.mc{min-height:130px;border-bottom:1px solid #e8e5df;border-right:1px solid #e8e5df;padding:5px;vertical-align:top;background:#fff;transition:background .1s;position:relative}
.mc.other{background:#f7f5f0;opacity:.5}
.mc.today{outline:2px solid #1a1a1a;outline-offset:-2px}
.mc.we{background:#faf9f7}
.mc.ferie{background:#fff5f5}
.mc.drop-over{background:#f0f9ff !important;outline:2px dashed #1a1a1a;outline-offset:-2px}
.mc.drop-over::after{
  content:'📋 ←  → ✂️';
  position:absolute;bottom:3px;left:0;right:0;
  text-align:center;font-size:9px;font-family:'DM Mono',monospace;
  color:#888;pointer-events:none;letter-spacing:.05em;
}
.wc.drop-over::after{
  content:'📋 ←  → ✂️';
  display:block;text-align:center;
  font-size:9px;font-family:'DM Mono',monospace;
  color:#888;padding:4px 0;letter-spacing:.05em;
}
.mc-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#ccc;margin-bottom:3px;line-height:1;display:flex;align-items:baseline;gap:4px}
.mc-num.tn{color:#1a1a1a}
.mc-ferie{font-family:'DM Mono',monospace;font-size:7px;color:#e03030;text-transform:uppercase;letter-spacing:.04em}
.mc-add{opacity:0;position:absolute;top:5px;right:5px;width:20px;height:20px;background:#f0ede8;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#888;transition:all .1s;font-weight:300}
.mc:hover .mc-add{opacity:1}
.mc-add:hover{background:#1a1a1a;color:#fff}

/* ── POST-IT ── */
.pi{border-radius:7px;padding:8px 9px;margin-bottom:5px;cursor:pointer;transition:all .15s;position:relative;border:1px solid rgba(0,0,0,.06)}
.pi:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.pi.drop-on{outline:2px solid #1a1a1a;outline-offset:-1px;transform:translateY(-1px)}
.pi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.pi-ref{font-family:'DM Mono',monospace;font-size:8px;opacity:.5;line-height:1}
.pi-name{font-weight:700;font-size:11px;line-height:1.25;flex:1}
.pi-badge{padding:2px 6px;border-radius:20px;font-family:'DM Mono',monospace;font-size:8px;font-weight:600;letter-spacing:.05em;white-space:nowrap;margin-top:3px;display:inline-block;margin-bottom:4px}
.pi-persons{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px}
.pi-pav{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:8px;border:1px solid rgba(255,255,255,.5)}
.pi-footer{display:flex;justify-content:space-between;align-items:center}
.pi-slots{font-family:'DM Mono',monospace;font-size:9px;font-weight:500}
.pi-cost{font-family:'DM Mono',monospace;font-size:9px;color:#888}
/* Empty card (no team yet) */
.pi-empty-hint{font-family:'DM Mono',monospace;font-size:9px;color:rgba(0,0,0,.35);font-style:italic;margin-bottom:4px}

/* ── WEEK GRID ── */
.wg{display:grid;grid-template-columns:repeat(7,1fr);min-width:800px;min-height:100%}
.wc-hd{padding:9px 8px;text-align:center;background:#fff;border-bottom:1px solid #e8e5df;border-right:1px solid #e8e5df;position:sticky;top:0;z-index:5}
.wc-hd.today{background:#1a1a1a}
.wc-hd.today .wh-day,.wc-hd.today .wh-date{color:#fff}
.wc-hd.we{background:#faf9f7}
.wh-day{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.1em;color:#bbb}
.wh-date{font-family:'DM Mono',monospace;font-size:10px;color:#ccc;margin-top:1px}
.wh-ferie{font-size:7px;color:#e03030;font-family:'DM Mono',monospace;letter-spacing:.04em;margin-top:1px}
.wc{border-right:1px solid #e8e5df;border-bottom:1px solid #e8e5df;padding:6px;min-height:calc(100vh - 145px);display:flex;flex-direction:column;gap:5px;background:#fff}
.wc.we{background:#faf9f7}
.wc.drop-over{background:#f0f9ff !important;outline:2px dashed #1a1a1a;outline-offset:-3px}

/* ── SUMMARY BAR ── */
.sum{height:42px;background:#fff;border-top:1px solid #e8e5df;display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;overflow-x:auto;box-shadow:0 -1px 4px rgba(0,0,0,.04)}
.ss{display:flex;flex-direction:column;padding:0 14px;border-right:1px solid #e8e5df;flex-shrink:0}
.ss:first-child{padding-left:0}
.ss-l{font-family:'DM Mono',monospace;font-size:8px;color:#bbb;text-transform:uppercase;letter-spacing:.08em}
.ss-v{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.04em;line-height:1.1;color:#1a1a1a}
.ss-v.muted{color:#888}

/* Phase colors — light theme */
.ph-atelier{background:#e8f4ff;color:#1a6fc4}
.ph-shoot,.ph-on-set{background:#f3eeff;color:#7c3aed}
.ph-install,.ph-strike{background:#fff3e0;color:#c2740a}
.ph-nuit{background:#e8f8ee;color:#1a8a42}
.ph-dep{background:#f0f0f0;color:#888}

/* ══════════════════════════════════
   PROJECT POPUP
══════════════════════════════════ */
.pp-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:400;display:flex;align-items:center;justify-content:center}
.pp{background:#fff;border:1px solid #e8e5df;border-radius:12px;width:560px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.pp-head{padding:18px 22px 14px;border-bottom:1px solid #f0ede8;flex-shrink:0}
.pp-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.07em;margin-bottom:2px;color:#1a1a1a}
.pp-meta{font-family:'DM Mono',monospace;font-size:10px;color:#aaa}
.pp-body{flex:1;overflow-y:auto;padding:18px 22px}
.pp-foot{padding:14px 22px;border-top:1px solid #f0ede8;background:#faf9f7;border-radius:0 0 12px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pp-total{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.05em;color:#1a1a1a}
.pp-lbl{font-family:'DM Mono',monospace;font-size:9px;color:#aaa;text-align:right}
.pp-sec{font-family:'DM Mono',monospace;font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.1em;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.pp-sec:first-child{margin-top:0}
.form-lbl{display:block;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:#aaa;margin-bottom:4px}
.form-inp,.form-sel{width:100%;padding:8px 10px;border:1px solid #e8e5df;border-radius:6px;background:#fff;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:12px;transition:border-color .12s}
.form-inp:focus,.form-sel:focus{outline:none;border-color:#1a1a1a}
.form-sel option{background:#fff}

/* Freelance row in popup */
.pp-fl{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#faf9f7;border:1px solid #eeebe6;border-radius:7px;margin-bottom:5px}
.pp-fl-nm{font-weight:600;font-size:13px}
.pp-fl-rl{font-family:'DM Mono',monospace;font-size:9px;color:#aaa;text-transform:uppercase}
.pp-fl-rate{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;color:#1a1a1a;white-space:nowrap}
.pp-fl-sub{font-family:'DM Mono',monospace;font-size:8px;color:#aaa;text-align:right}
.chef-btn{padding:3px 9px;border-radius:20px;border:1px solid #e0ddd8;background:#fff;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:#aaa;transition:all .1s}
.chef-btn.on{background:#f0d000;border-color:#e0c000;color:#1a1a1a;font-weight:700}
.stp{display:flex;align-items:center;gap:3px}
.stp-b{width:22px;height:22px;border-radius:4px;border:1px solid #e0ddd8;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#aaa;transition:all .1s;flex-shrink:0}
.stp-b:hover{border-color:#1a1a1a;color:#1a1a1a}
.stp-v{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;min-width:34px;text-align:center;background:#f0ede8;border-radius:4px;padding:2px 4px;color:#1a1a1a}
.bulk-row{display:flex;gap:5px;margin-bottom:8px}
.bulk-b{padding:3px 9px;border-radius:4px;border:1px solid #e0ddd8;background:#fff;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:#aaa;transition:all .1s}
.bulk-b:hover{border-color:#1a1a1a;color:#1a1a1a}
.pp-search{width:100%;padding:9px 12px;border:1px solid #e8e5df;border-radius:6px;background:#faf9f7;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:5px}
.pp-search:focus{outline:none;border-color:#1a1a1a}
.pp-sr{background:#faf9f7;border:1px solid #e8e5df;border-radius:6px;overflow:hidden;margin-bottom:6px}
.pp-sri{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;font-size:12px}
.pp-sri:hover{background:#f0ede8}
.maj-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.maj-btn{padding:6px;border-radius:5px;border:1px solid #e0ddd8;background:#fff;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;text-align:center;color:#aaa;transition:all .1s}
.maj-btn.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff;font-weight:700}
.maj-btn:hover{border-color:#888;color:#1a1a1a}

/* ══════════════════════════════════
   MODALS
══════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border:1px solid #e8e5df;border-radius:12px;padding:26px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.07em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0ede8;color:#1a1a1a}
.form-row{margin-bottom:12px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #f0ede8}
.c-strip{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.c-sw{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .1s}
.c-sw.on,.c-sw:hover{border-color:#1a1a1a;transform:scale(1.2)}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag-pill{padding:3px 9px;border-radius:20px;border:1px solid #e0ddd8;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;color:#aaa;background:#fff;transition:all .1s}
.tag-pill.on{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.role-hint{margin-top:5px;font-family:'DM Mono',monospace;font-size:9px;color:#bbb;line-height:1.6;padding:7px 10px;background:#f7f5f0;border-radius:5px}

/* ══════════════════════════════════
   PROJETS PAGE
══════════════════════════════════ */
#pg-proj{overflow-y:auto;flex-direction:column;background:#f7f5f0}
.page-wrap{padding:28px;max-width:1100px;margin:0 auto;width:100%}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:.07em;color:#1a1a1a;margin-bottom:2px}
.page-sub{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;margin-bottom:24px}
.status-bar{display:flex;background:#fff;border:1px solid #e8e5df;border-radius:7px;padding:3px;gap:2px;margin-bottom:20px;width:fit-content;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stab{padding:5px 14px;border:none;border-radius:5px;background:transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#aaa;transition:all .12s}
.stab.on{background:#1a1a1a;color:#fff}
.stab-n{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:20px;background:rgba(0,0,0,.08);font-size:9px;margin-left:3px;padding:0 3px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.pc{background:#fff;border:1px solid #e8e5df;border-radius:10px;padding:16px;transition:all .15s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.pc:hover{border-color:#ccc;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.pc-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.pc-ref{font-family:'DM Mono',monospace;font-size:9px;color:#bbb;margin-bottom:3px}
.pc-name{font-weight:700;font-size:15px;margin-bottom:2px;line-height:1.2;color:#1a1a1a}
.pc-client{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;margin-bottom:12px}
.pc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pc-stat{background:#f7f5f0;border-radius:5px;padding:7px 9px}
.pc-stat-l{font-family:'DM Mono',monospace;font-size:8px;color:#bbb;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.pc-stat-v{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;color:#1a1a1a}
.pc-bar{height:4px;background:#f0ede8;border-radius:2px;overflow:hidden;margin-bottom:12px}
.pc-bar-f{height:100%;border-radius:2px;transition:width .3s}
.pc-status{padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;display:inline-block;border:1px solid}
.st-active{background:#e8f8ee;color:#1a8a42;border-color:#b6eac7}
.st-upcoming{background:#e8f1ff;color:#1a5cc4;border-color:#b6ccf0}
.st-done{background:#f0f0f0;color:#888;border-color:#e0e0e0}
.st-pause{background:#fff3e0;color:#b26300;border-color:#f0d090}
.st-arch{background:#f5f5f5;color:#bbb;border-color:#e8e8e8}
.pc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.pc-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s}
.pc:hover .pc-actions{opacity:1}

/* ══════════════════════════════════
   FREELANCES PAGE
══════════════════════════════════ */
#pg-fl{overflow-y:auto;flex-direction:column;background:#f7f5f0}

<script>
// ══════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════
const PC=['#f0c020','#ff5722','#e91e63','#009688','#3f51b5','#9c27b0','#ff9800','#2196f3','#4caf50','#795548'];
const FC=['#ff5722','#2196f3','#4caf50','#9c27b0','#ff9800','#e91e63','#009688','#3f51b5','#f44336','#795548'];
const TAGS=['Atelier','ON-SET','Strike','Peinture','Metal','Menuiserie','Soudure','Finition','Sculpture','Deco','Couture','Patine','Electricite','Montage','Transport'];
const ROLES=['Constructeur','Peintre','Couture','Electricien','Sculpteur','Autre'];
const ROLE_DEF={'Constructeur':{a:250,s:300,i:300},'Peintre':{a:250,s:300,i:300},'Couture':{a:300,s:320,i:300},'Electricien':{a:250,s:300,i:300},'Sculpteur':{a:280,s:320,i:300},'Autre':{a:250,s:300,i:300}};
const PHASES=[
  {id:'atelier',label:'Atelier',rk:'a',h:10},
  {id:'shoot',label:'ON-SET',rk:'s',h:10},
  {id:'install',label:'Install',rk:'i',h:10},
  {id:'nuit',label:'Nuit',fixed:400,h:null},
  {id:'dep',label:'Deplacement',fixed:80,h:null},
];
const DAYS=['LUN','MAR','MER','JEU','VEN','SAM','DIM'];
const MONTHS=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
const STATUS_LIST=[{id:'all',l:'Tous'},{id:'active',l:'En cours'},{id:'upcoming',l:'A venir'},{id:'done',l:'Termines'},{id:'pause',l:'En pause'},{id:'archived',l:'Archives'}];

// ══════════════════════════════════════
// FERIES
// ══════════════════════════════════════
function eDateFR(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,dy)}
function dk(d){return d.toISOString().slice(0,10)}
function addD(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
const FER={};
[2024,2025,2026,2027].forEach(y=>{
  const e=eDateFR(y);
  const s=(d,n)=>{FER[dk(d)]=n};
  s(new Date(y,0,1),"Jour de l'An");s(addD(e,1),'Lundi de Paques');
  s(new Date(y,4,1),'Fete du Travail');s(new Date(y,4,8),'Victoire 1945');
  s(addD(e,39),'Ascension');s(addD(e,50),'Pentecote');
  s(new Date(y,6,14),'Fete Nationale');s(new Date(y,7,15),'Assomption');
  s(new Date(y,10,1),'Toussaint');s(new Date(y,10,11),'Armistice');
  s(new Date(y,11,25),'Noel');
});

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let D={
  view:'month',offset:0,
  projFilter:'all',roleFilter:'all',
  editId:null,selColor:PC[0],
  pp:null,ppSearch:'',
  dragType:null,dragId:null,
  pendingProjDate:null,
  persons:[
    {id:'fl1',name:'Alex R.',role:'Constructeur',color:'#ff5722',forced:null,tags:['Atelier','ON-SET'],fav:false},
    {id:'fl2',name:'Camille T.',role:'Autre',color:'#2196f3',forced:null,tags:['Deco'],fav:true},
    {id:'fl3',name:'Lea M.',role:'Couture',color:'#9c27b0',forced:null,tags:['Finition'],fav:false},
    {id:'fl4',name:'Hugo D.',role:'Constructeur',color:'#4caf50',forced:null,tags:['Menuiserie'],fav:false},
  ],
  projects:[
    {id:'p1',name:'Decor Arte Paris',ref:'PRJ-001',client:'Arte',color:'#f0c020',days:12,budget:3200,status:'active',start:'2026-04-14',end:'2026-04-28',archived:false},
    {id:'p2',name:'Shoot Vogue',ref:'PRJ-002',client:'Vogue',color:'#ff5722',days:6,budget:1800,status:'done',start:'2026-01-10',end:'2026-01-15',archived:false},
    {id:'p3',name:'Install Galerie X',ref:'PRJ-003',client:'Galerie X',color:'#2196f3',days:8,budget:2200,status:'upcoming',start:'2026-05-01',end:'2026-05-10',archived:false},
  ],
  bookings:[],
};

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function uid(){return 'i'+Date.now()+Math.random().toString(36).slice(2,6)}
function isFerie(d){return!!FER[dk(d)]}
function isWE(d){return d.getDay()===0||d.getDay()===6}
function isToday(d){const t=new Date();return d.toDateString()===t.toDateString()}
function ini(n){return n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()}
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}
function fmtS(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})}
function fmtL(d){return d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}
function wkn(d){const D=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));D.setUTCDate(D.getUTCDate()+4-(D.getUTCDay()||7));const y=new Date(Date.UTC(D.getUTCFullYear(),0,1));return Math.ceil((((D-y)/86400000)+1)/7)}
function getMon(off=0){const n=new Date();n.setHours(0,0,0,0);const dw=n.getDay();const m=new Date(n);m.setDate(n.getDate()+(dw===0?-6:1-dw)+off*7);return m}
function getWD(off=0){const m=getMon(off);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d})}
function getPerson(id){return D.persons.find(p=>p.id===id)}
function getProject(id){return D.projects.find(p=>p.id===id)}
function getPhase(id){return PHASES.find(p=>p.id===id)}
function getRate(p,phId){
  if(!p)return 0;
  if(p.forced)return p.forced;
  const ph=getPhase(phId);if(!ph)return 250;
  if(ph.fixed!=null)return ph.fixed;
  const rd=ROLE_DEF[p.role]||ROLE_DEF['Autre'];
  return rd[ph.rk]||250;
}
function calcCost(b){
  const p=getPerson(b.personId);if(!p)return 0;
  const ph=getPhase(b.type);if(!ph)return 0;
  const mult=b.maj||1;
  let base=ph.fixed!=null?ph.fixed:getRate(p,b.type);
  if(b.chef)base+=50;
  let cost=base*mult;
  if(b.supH>0&&ph.h)cost+=((base/ph.h)*1.5*b.supH*mult);
  return Math.round(cost*100)/100;
}
function pjDays(pid){return D.bookings.filter(b=>b.projectId===pid).reduce((s,b)=>s+1+(b.supH?b.supH/10:0),0)}
function pjCost(pid){return D.bookings.filter(b=>b.projectId===pid).reduce((s,b)=>s+calcCost(b),0)}
function phCls(id){return {atelier:'ph-atelier',shoot:'ph-shoot',install:'ph-install',nuit:'ph-nuit',dep:'ph-dep'}[id]||'ph-atelier'}
function stInfo(s){return {active:{l:'En cours',c:'st-active'},upcoming:{l:'A venir',c:'st-upcoming'},done:{l:'Termine',c:'st-done'},pause:{l:'En pause',c:'st-pause'},archived:{l:'Archive',c:'st-arch'}}[s]||{l:s,c:'st-done'}}

// ══════════════════════════════════════
// DRAG & DROP — clean implementation
// ══════════════════════════════════════
function makeDraggable(el, type, id){
  el.draggable=true;
  el.addEventListener('dragstart',e=>{
    D.dragType=type;
    D.dragId=id;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='copy';
    e.dataTransfer.setData('text/plain', JSON.stringify({type,id}));
  });
  el.addEventListener('dragend',()=>{
    el.classList.remove('dragging');
    D.dragType=null;
    D.dragId=null;
  });
}

function makeDropZone(el, onDrop, date){
  el.addEventListener('dragenter',e=>{e.preventDefault()});
  el.addEventListener('dragover',e=>{
    e.preventDefault();
    e.dataTransfer.dropEffect = cardDrag ? 'copyMove' : 'copy';
    el.classList.add('drop-over');
  });
  el.addEventListener('dragleave',e=>{
    if(!el.contains(e.relatedTarget))el.classList.remove('drop-over');
  });
  el.addEventListener('drop',e=>{
    e.preventDefault();
    el.classList.remove('drop-over');
    // Card drag takes priority
    if(cardDrag && date){
      if(cardDrag.fromDate !== date)
        showDropMenu(cardDrag.projId, cardDrag.fromDate, date, e.clientX, e.clientY, e.currentTarget);
      return;
    }
    // Sidebar drag
    if(D.dragType && D.dragId) onDrop(D.dragType, D.dragId, e);
  });
}

function makePostitDrop(el, projId, date){
  el.addEventListener('dragenter',e=>{e.preventDefault();e.stopPropagation()});
  el.addEventListener('dragover',e=>{
    e.preventDefault();e.stopPropagation();
    if(cardDrag && cardDrag.projId === projId) return; // same card
    e.dataTransfer.dropEffect = cardDrag ? 'copyMove' : 'copy';
    el.classList.add('drop-on');
  });
  el.addEventListener('dragleave',e=>{
    if(!el.contains(e.relatedTarget))el.classList.remove('drop-on');
  });
  el.addEventListener('drop',e=>{
    e.preventDefault();e.stopPropagation();
    el.classList.remove('drop-on');
    // Card drag: show move/copy menu
    if(cardDrag){
      if(cardDrag.fromDate !== date)
        showDropMenu(cardDrag.projId, cardDrag.fromDate, date, e.clientX, e.clientY, e.currentTarget);
      return;
    }
    // Freelance drag from sidebar
    if(D.dragType==='freelance' && D.dragId){
      addFlToCard(D.dragId, projId, date);
    }
  });
}

function renderPlanning(){

function renderMonth(){
  const now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth()+D.offset,1);
  document.getElementById('plbl').textContent=`${MONTHS[target.getMonth()]} ${target.getFullYear()}`;
  const grid=document.getElementById('plan-grid');
  const g=document.createElement('div');g.className='mg';
  DAYS.forEach(d=>{const h=document.createElement('div');h.className='mg-hd';h.textContent=d;g.appendChild(h)});
  const first=new Date(target.getFullYear(),target.getMonth(),1);
  let sdow=first.getDay();if(sdow===0)sdow=7;
  const start=new Date(first);start.setDate(start.getDate()-(sdow-1));
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const other=d.getMonth()!==target.getMonth();
    const cell=document.createElement('div');
    let cls='mc';
    if(other)cls+=' other';
    else if(isToday(d))cls+=' today';
    else if(isFerie(d))cls+=' ferie';
    else if(isWE(d))cls+=' we';
    cell.className=cls;
    // Day number
    const num=document.createElement('div');
    num.className='mc-num'+(isToday(d)?' tn':'');
    num.innerHTML=String(d.getDate())+(isFerie(d)?` <span class="mc-ferie">${FER[dk(d)]}</span>`:'');
    cell.appendChild(num);
    if(!other){
      // + button
      const add=document.createElement('div');add.className='mc-add';add.textContent='+';
      add.onclick=e=>{e.stopPropagation();openPPNew(dk(d))};
      cell.appendChild(add);
      // Post-its
      const dayB=D.bookings.filter(b=>b.date===dk(d));
      const byProj={};
      dayB.forEach(b=>{if(!byProj[b.projectId])byProj[b.projectId]=[];byProj[b.projectId].push(b)});
      D.projects.filter(p=>!p.archived&&byProj[p.id]).forEach(proj=>{
        cell.appendChild(makePostit(proj,byProj[proj.id],dk(d)));
      });
      // Drop on cell (card move/copy + new drag)
      makeCardDropZone(cell, dk(d));
      makeCardDropZone(cell, dk(d));
    makeDropZone(cell,(type,id)=>{
        if(type==='project'){
          // Create empty card for this project on this day
          const exists=D.bookings.find(b=>b.projectId===id&&b.date===dk(d));
          if(!exists){
            // Create a "placeholder" booking with no person
            D.bookings.push({id:uid(),personId:null,date:dk(d),projectId:id,type:'atelier',chef:false,supH:0,maj:1,target:0,placeholder:true});
            renderPlanning();
          }
          // Open popup
          openPP(id,dk(d));
        } else if(type==='freelance'){
          // Drop freelance on empty day — pick first active project or ask
          const activeProj=D.projects.find(p=>!p.archived&&p.status==='active')||D.projects.find(p=>!p.archived);
          if(!activeProj){alert('Creez un projet dabord !');return}
          addFlToCard(id,activeProj.id,dk(d));
          openPP(activeProj.id,dk(d));
        }
      });
    }
    g.appendChild(cell);
  }
  grid.innerHTML='';grid.appendChild(g);
  renderSum(null,target);
}

function renderWeek(){
  const days=getWD(D.offset);
  document.getElementById('plbl').textContent=`Sem. ${wkn(days[0])} — ${fmtS(days[0])} > ${fmtS(days[6])}`;
  const grid=document.getElementById('plan-grid');
  const g=document.createElement('div');g.className='wg';
  days.forEach((d,di)=>{
    const hd=document.createElement('div');
    let hcls='wc-hd';
    if(isToday(d))hcls+=' today';else if(isWE(d))hcls+=' we';
    hd.className=hcls;
    hd.innerHTML=`<div class="wh-day">${DAYS[di]}</div><div class="wh-date">${fmtS(d)}</div>${isFerie(d)?`<div class="wh-ferie">${FER[dk(d)]}</div>`:''}`;
    g.appendChild(hd);
  });
  days.forEach(d=>{
    const cell=document.createElement('div');
    cell.className='wc'+(isWE(d)||isFerie(d)?' we':'');
    const dayB=D.bookings.filter(b=>b.date===dk(d));
    const byProj={};
    dayB.forEach(b=>{if(!byProj[b.projectId])byProj[b.projectId]=[];byProj[b.projectId].push(b)});
    D.projects.filter(p=>!p.archived&&byProj[p.id]).forEach(proj=>{
      cell.appendChild(makePostit(proj,byProj[proj.id],dk(d)));
    });
    makeCardDropZone(cell, dk(d));
    makeDropZone(cell,(type,id)=>{
      if(type==='project'){
        const exists=D.bookings.find(b=>b.projectId===id&&b.date===dk(d));
        if(!exists){D.bookings.push({id:uid(),personId:null,date:dk(d),projectId:id,type:'atelier',chef:false,supH:0,maj:1,target:0,placeholder:true});renderPlanning()}
        openPP(id,dk(d));
      } else if(type==='freelance'){
        const ap=D.projects.find(p=>!p.archived&&p.status==='active')||D.projects.find(p=>!p.archived);
        if(!ap){alert('Creez un projet dabord !');return}
        addFlToCard(id,ap.id,dk(d));openPP(ap.id,dk(d));
      }
    }, dk(d));
    g.appendChild(cell);
  });
  grid.innerHTML='';grid.appendChild(g);
  renderSum(days);
}

function makePostit(proj,bookings,date){
  const booked=pjDays(proj.id);
  const realBk=bookings.filter(b=>!b.placeholder);
  const ph=getPhase(bookings[0]?.type||'atelier');
  const total=realBk.reduce((s,b)=>s+calcCost(b),0);
  const target=bookings[0]?.target||0;
  const noTeam=realBk.length===0;

  const el=document.createElement('div');
  el.className='pi';
  el.style.background=rgba(proj.color,.08);
  el.style.borderColor=rgba(proj.color,.2);

  const isWeekView = D.view === 'week';
  const pHTML = isWeekView
    ? realBk.map(b=>{
        const p=getPerson(b.personId);if(!p)return'';
        return `<div style="display:flex;align-items:center;gap:5px;padding:2px 0">
          <div class="pi-pav" style="background:${rgba(p.color,.2)};color:${p.color};flex-shrink:0">${ini(p.name)}</div>
          <span style="font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}${b.chef?' <span style="color:#b28000;font-size:9px">★</span>':''}</span>
          ${b.supH>0?`<span style="font-family:'DM Mono',monospace;font-size:9px;color:#aaa;margin-left:auto">+${b.supH}h</span>`:''}
        </div>`;
      }).join('')
    : realBk.map(b=>{
        const p=getPerson(b.personId);if(!p)return'';
        return `<div class="pi-pav" style="background:${rgba(p.color,.2)};color:${p.color}" title="${p.name}">${ini(p.name)}</div>`;
      }).join('');

  let slotTxt='',slotColor='#888';
  if(target>0){
    if(realBk.length>=target){slotTxt=`${realBk.length}/${target} ✓`;slotColor='#1a8a42'}
    else{slotTxt=`${realBk.length}/${target} · ${realBk.length} pers.`;slotColor='#b26300'}
  } else {
    slotTxt=realBk.length>0?`${realBk.length} pers.`:'Equipe a definir';
    slotColor=realBk.length>0?'#555':'#ccc';
  }

  el.innerHTML=`
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${proj.color};border-radius:7px 7px 0 0"></div>
    <div class="pi-top">
      <div style="flex:1;min-width:0">
        ${proj.ref?`<div class="pi-ref">${proj.ref}</div>`:''}
        <div class="pi-name">${proj.name}</div>
      </div>
    </div>
    <span class="pi-badge ${phCls(bookings[0]?.type||'atelier')}">${ph?ph.label:'Atelier'}</span>
    ${noTeam
      ? `<div class="pi-empty-hint">Equipe a definir...</div>`
      : isWeekView
        ? `<div style="display:flex;flex-direction:column;gap:0;margin-bottom:4px">${pHTML}</div>`
        : `<div class="pi-persons">${pHTML}</div>`}
    <div class="pi-footer">
      <div class="pi-slots" style="color:${slotColor}">${slotTxt}</div>
      <div class="pi-cost">${total>0?total.toLocaleString('fr-FR')+' €':''}</div>
    </div>`;

  el.addEventListener('click',e=>{
    if(el._wasDragged)return;
    e.stopPropagation();openPP(proj.id,date)
  });
  makePostitDrop(el,proj.id,date);
  makeCardDraggable(el,proj.id,date);
  return el;
}

function renderSum(days,month){
  let bk;
  if(days){const ks=new Set(days.map(dk));bk=D.bookings.filter(b=>ks.has(b.date)&&!b.placeholder)}
  else{bk=D.bookings.filter(b=>{const d=new Date(b.date);return!b.placeholder&&d.getMonth()===month.getMonth()&&d.getFullYear()===month.getFullYear()})}
  const total=bk.reduce((s,b)=>s+calcCost(b),0);
  const ppl=new Set(bk.filter(b=>b.personId).map(b=>b.personId)).size;
  const nbCards=new Set(bk.map(b=>b.projectId+'|'+b.date)).size;
  // Count placeholder cards (project placed but no team yet)
  const placeholders=days
    ? D.bookings.filter(b=>b.placeholder&&new Set(days.map(dk)).has(b.date)).length
    : D.bookings.filter(b=>{const d=new Date(b.date);return b.placeholder&&d.getMonth()===month.getMonth()&&d.getFullYear()===month.getFullYear()}).length;
  let h=`<div class="ss"><div class="ss-l">${days?'Semaine':'Mois'} MO</div><div class="ss-v">${total.toLocaleString('fr-FR')} €</div></div>
         <div class="ss"><div class="ss-l">Personnes</div><div class="ss-v muted">${ppl}</div></div>
         <div class="ss"><div class="ss-l">Bookings</div><div class="ss-v muted">${bk.length}</div></div>
         ${placeholders>0?`<div class="ss"><div class="ss-l" style="color:#b26300">A completer</div><div class="ss-v" style="color:#b26300">${placeholders}</div></div>`:''}`;
  D.projects.filter(p=>!p.archived).forEach(proj=>{
    const pb=bk.filter(b=>b.projectId===proj.id);if(!pb.length)return;
    const pc=pb.reduce((s,b)=>s+calcCost(b),0);
    const over=pjDays(proj.id)>proj.days;
    const nbP=new Set(pb.map(b=>b.personId)).size;
    h+=`<div class="ss"><div class="ss-l" style="color:${rgba(proj.color,.9)}">${(proj.ref?proj.ref+' ':'')+proj.name.slice(0,12)}</div><div class="ss-v" style="color:${over?'#e03030':'#1a1a1a'};font-size:15px">${pc.toLocaleString('fr-FR')}€ <span style="font-family:'DM Mono',monospace;font-size:9px;color:#aaa">· ${nbP}p</span></div></div>`;
  });
  document.getElementById('sum').innerHTML=h;
}

function renderPP(){
  if(!D.pp)return;
  const {projId,date}=D.pp;
  const proj=getProject(projId);if(!proj)return;
  const allBk=D.bookings.filter(b=>b.projectId===projId&&b.date===date);
  const realBk=allBk.filter(b=>!b.placeholder);
  const phase=allBk[0]?.type||'atelier';
  const maj=allBk[0]?.maj||1;
  const target=allBk[0]?.target||0;
  const total=realBk.reduce((s,b)=>s+calcCost(b),0);

function addFlToCard(flId,projId,date){
  // Check if person already booked on this day on ANY project
  const alreadyDay=D.bookings.find(b=>b.personId===flId&&b.date===date&&!b.placeholder);
  if(alreadyDay){
    const existProj=getProject(alreadyDay.projectId);
    const p=getPerson(flId);
    alert((p?p.name:'Cette personne')+' est deja book'+String.fromCharCode(233)+' le '+date+(existProj?' sur '+existProj.name:'')+'.');
    return;
  }
  // Get phase and maj from existing bookings on this card
  const existing=D.bookings.find(b=>b.projectId===projId&&b.date===date);
  const phase=existing?.type||'atelier';
  const maj=existing?.maj||1;
  const target=existing?.target||0;
  // Remove placeholder if exists
  D.bookings=D.bookings.filter(b=>!(b.projectId===projId&&b.date===date&&b.placeholder));
  D.bookings.push({id:uid(),personId:flId,date,projectId:projId,type:phase,chef:false,supH:0,maj,target});
  renderPlanning();save();
  if(D.pp&&D.pp.projId===projId&&D.pp.date===date)renderPP();
}

function addFlPP(flId){if(!D.pp)return;D.ppSearch='';addFlToCard(flId,D.pp.projId,D.pp.date)}

function onPPSearch(val){
  D.ppSearch=val;
  if(!D.pp)return;
  const {projId,date}=D.pp;
  const phase=D.bookings.find(b=>b.projectId===projId&&b.date===date)?.type||'atelier';
  const realBk=D.bookings.filter(b=>b.projectId===projId&&b.date===date&&!b.placeholder);
  const alreadyIds=new Set(realBk.map(b=>b.personId));
  const srDiv=document.getElementById('pp-sr-results');
  if(!srDiv)return;
  if(val.length<2){srDiv.innerHTML='';return}
  const res=D.persons.filter(p=>!alreadyIds.has(p.id)&&p.name.toLowerCase().includes(val.toLowerCase()));
  if(!res.length){srDiv.innerHTML='';return}
  srDiv.innerHTML='<div class="pp-sr">'+res.map(p=>`<div class="pp-sri" onclick="addFlPP('${p.id}')">
    <div class="av" style="background:${rgba(p.color,.15)};color:${p.color};width:22px;height:22px;font-size:9px">${ini(p.name)}</div>
    <span style="font-weight:600">${p.name}</span>
    <span style="font-family:'DM Mono',monospace;font-size:9px;color:#bbb">${p.role}</span>
    <span style="font-family:'DM Mono',monospace;font-size:10px;color:#888;margin-left:auto">${getRate(p,phase)}€/j</span>
  </div>`).join('')+'</div>';
}
function tgChef(id){const b=D.bookings.find(x=>x.id===id);if(b){b.chef=!b.chef;renderPP();renderPlanning();save()}}
function stpHS(id,delta){const b=D.bookings.find(x=>x.id===id);if(b){b.supH=Math.max(0,Math.round(((b.supH||0)+delta)*10)/10);renderPP();renderPlanning();save()}}
function blkHS(delta,reset=false){
  if(!D.pp)return;
  D.bookings.filter(b=>b.projectId===D.pp.projId&&b.date===D.pp.date&&!b.placeholder).forEach(b=>{
    b.supH=reset?0:Math.max(0,Math.round(((b.supH||0)+delta)*10)/10);
  });
  renderPP();renderPlanning();save();
}
function chgPhase(v){if(!D.pp)return;D.bookings.filter(b=>b.projectId===D.pp.projId&&b.date===D.pp.date).forEach(b=>b.type=v);renderPP();renderPlanning();save()}
function chgMaj(v){if(!D.pp)return;D.bookings.filter(b=>b.projectId===D.pp.projId&&b.date===D.pp.date).forEach(b=>b.maj=v);renderPP();renderPlanning();save()}
function chgProj(v){
  if(!D.pp)return;
  D.bookings.filter(b=>b.projectId===D.pp.projId&&b.date===D.pp.date).forEach(b=>b.projectId=v);
  D.pp.projId=v;renderPP();renderPlanning();
}
function chgTarget(v){if(!D.pp)return;D.bookings.filter(b=>b.projectId===D.pp.projId&&b.date===D.pp.date).forEach(b=>b.target=v);renderPlanning()}
function delBk(id){D.bookings=D.bookings.filter(b=>b.id!==id);renderPP();renderPlanning();save()}
function delCard(){
  if(!D.pp||!confirm('Supprimer ?'))return;
  D.bookings=D.bookings.filter(b=>!(b.projectId===D.pp.projId&&b.date===D.pp.date));
  closePP();
}

function showDropMenu(projId, fromDate, toDate, cx, cy, targetEl){
  dropMenuData = {projId, fromDate, toDate};
  const proj = getProject(projId);
  const toD = new Date(toDate+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  const fromD = new Date(fromDate+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});

  // Determine action from position within target cell
  if(targetEl){
    const rect = targetEl.getBoundingClientRect();
    const action = cx < rect.left + rect.width / 2 ? 'copy' : 'move';
    doCardAction(action);
    showSync((action==='copy'?'📋 Copié':'✂️ Déplacé')+' → '+toD, true);
    return;
  }

  // Fallback menu
  const menu = document.getElementById('drop-menu');
  menu.innerHTML = `
    <div class="drop-menu-title">${proj?proj.name:''} · ${fromD} → ${toD}</div>
    <div class="drop-menu-item" onclick="doCardAction('copy')"><span class="dmi-icon">📋</span><div><div>Copier</div><div class="dmi-sub">← côté gauche</div></div></div>
    <div class="drop-menu-item" onclick="doCardAction('move')"><span class="dmi-icon">✂️</span><div><div>Déplacer</div><div class="dmi-sub">→ côté droit</div></div></div>
    <div class="drop-menu-cancel" onclick="closeDropMenu()">Annuler</div>`;
  const mw=200,mh=140,vw=window.innerWidth,vh=window.innerHeight;
  let x=cx+8,y=cy+8;
  if(x+mw>vw-8)x=cx-mw-8;
  if(y+mh>vh-8)y=cy-mh-8;
  menu.style.left=Math.max(8,x)+'px';
  menu.style.top=Math.max(8,y)+'px';
  menu.classList.remove('hidden');
  document.getElementById('drop-menu-overlay').style.display='block';
}

function doCardAction(action){
  if(!dropMenuData) return;
  const {projId, fromDate, toDate} = dropMenuData;
  const fromBk = D.bookings.filter(b => b.projectId === projId && b.date === fromDate);

  if(action === 'copy'){
    // Copy all bookings from fromDate to toDate (skip if already exists)
    const existingIds = new Set(D.bookings.filter(b=>b.projectId===projId&&b.date===toDate).map(b=>b.personId));
    fromBk.forEach(b => {
      if(b.placeholder){
        if(!D.bookings.find(bk=>bk.projectId===projId&&bk.date===toDate)){
          D.bookings.push({...b, id:uid(), date:toDate});
        }
      } else if(!existingIds.has(b.personId)){
        D.bookings.push({...b, id:uid(), date:toDate});
      }
    });
  } else if(action === 'move'){
    // Move: change date of all bookings
    const toAlready = D.bookings.filter(b=>b.projectId===projId&&b.date===toDate);
    if(toAlready.length > 0){
      // Merge: add missing persons from fromDate to toDate, remove fromDate
      const existingIds = new Set(toAlready.map(b=>b.personId));
      fromBk.forEach(b => {
        if(!b.placeholder && !existingIds.has(b.personId)){
          D.bookings.push({...b, id:uid(), date:toDate});
        }
      });
      D.bookings = D.bookings.filter(b=>!(b.projectId===projId&&b.date===fromDate));
    } else {
      // Simple move
      fromBk.forEach(b => b.date = toDate);
    }
  }

  closeDropMenu();
  renderPlanning();save();
}

function closeDropMenu(){
  document.getElementById('drop-menu').classList.add('hidden');
  document.getElementById('drop-menu-overlay').style.display = 'none';
  dropMenuData = null;
}

// Show sync indicator
let syncEl = null;
function showSync(msg, ok=true){
  if(!syncEl){
    syncEl = document.createElement('div');
    syncEl.style.cssText = 'position:fixed;bottom:50px;right:16px;padding:6px 12px;border-radius:20px;font-family:DM Mono,monospace;font-size:10px;z-index:9999;transition:opacity .5s;pointer-events:none';
    document.body.appendChild(syncEl);
  }
  syncEl.textContent = msg;
  syncEl.style.background = ok ? '#1a8a42' : '#e03030';
  syncEl.style.color = '#fff';
  syncEl.style.opacity = '1';
  clearTimeout(syncEl._t);
  syncEl._t = setTimeout(()=>{ syncEl.style.opacity='0'; }, 2000);
}

// Load all data from Supabase
const LS_KEY = 'overtime-looppp-v2';

function lsSave(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({persons:D.persons,projects:D.projects,bookings:D.bookings}))}catch(e){}
}
function lsLoad(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const s=JSON.parse(raw);
    if(s.persons&&s.persons.length)D.persons=s.persons;
    if(s.projects&&s.projects.length)D.projects=s.projects;
    if(s.bookings)D.bookings=s.bookings;
    return true;
  }catch(e){return false;}
}

async function loadFromDB(){
  // 1. D'abord charger depuis LocalStorage — instantané
  const hadLocal = lsLoad();
  if(hadLocal) renderPlanning();

  // 2. Essayer Supabase
  showSync('⟳ Synchro...', true);
  try{
    const [projs, fls, bks] = await Promise.all([sbGet('projects'), sbGet('freelances'), sbGet('bookings')]);
    const sbHasData = (projs&&projs.length>0)||(fls&&fls.length>0)||(bks&&bks.length>0);

    if(sbHasData){
      // Supabase a des données → on les utilise
      if(projs && projs.length > 0) D.projects = projs.map(rowToProject);
      if(fls && fls.length > 0) D.persons = fls.map(rowToFreelance);
      if(bks && bks.length > 0) D.bookings = bks.map(rowToBooking);
      lsSave();
      renderPlanning();
      showSync('✓ En ligne · ' + (fls?fls.length:0) + ' freelances · ' + (projs?projs.length:0) + ' projets', true);
    } else {
      // Supabase vide → on pousse nos données locales dedans
      showSync('⟳ Initialisation Supabase...', true);
      await pushAllToSupabase();
      showSync('✓ Données envoyées à Supabase !', true);
    }
  }catch(e){
    showSync(hadLocal ? '✓ Local (hors ligne)' : '⚠ Erreur connexion', hadLocal);
    console.warn('Supabase error:', e);
  }
}

async function pushAllToSupabase(){
  // Delete then re-insert all — ensures clean state
  try{
    await Promise.all([
      sbUpsert('projects', D.projects.map(projectToRow)),
      sbUpsert('freelances', D.persons.map(freelanceToRow)),
    ]);
    // Bookings after because they reference projects + freelances
    if(D.bookings.length > 0){
      await sbUpsert('bookings', D.bookings.map(bookingToRow));
    }
  }catch(e){ console.error('pushAllToSupabase error:', e); throw e; }
}

async function forcSync(){
  showSync('⟳ Synchro forcée...', true);
  try{
    await pushAllToSupabase();
    showSync('✓ Tout synchronisé !', true);
  }catch(e){
    showSync('⚠ Erreur sync : ' + e.message, false);
  }
}
